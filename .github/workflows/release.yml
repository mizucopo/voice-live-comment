name: Release extension

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate release version
        run: |
          set -euo pipefail

          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          manifest_version="$(node -p "require('./manifest.json').version")"

          if [[ ! "$tag_version" =~ ^[0-9]+(\.[0-9]+){2,3}$ ]]; then
            echo "Tag must be v<major>.<minor>.<patch> or v<major>.<minor>.<patch>.<build>: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          if [[ "$package_version" != "$tag_version" ]]; then
            echo "package.json version (${package_version}) does not match tag (${tag_version})" >&2
            exit 1
          fi

          if [[ "$manifest_version" != "$tag_version" ]]; then
            echo "manifest.json version (${manifest_version}) does not match tag (${tag_version})" >&2
            exit 1
          fi

          echo "RELEASE_VERSION=${tag_version}" >> "$GITHUB_ENV"
          echo "ZIP_NAME=voice-live-comment-v${tag_version}.zip" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build content script
        run: npm run build

      - name: Package extension
        run: |
          set -euo pipefail

          package_name="voice-live-comment-v${RELEASE_VERSION}"
          package_dir="${RUNNER_TEMP}/${package_name}"
          mkdir -p "$package_dir"

          cp manifest.json options.html "$package_dir/"
          cp -R src dist icons "$package_dir/"

          test -f "$package_dir/manifest.json"
          test -f "$package_dir/options.html"
          test -f "$package_dir/dist/content.js"
          test -f "$package_dir/src/background.js"
          test -f "$package_dir/src/options.js"
          test -f "$package_dir/icons/icon128.png"

          (cd "$RUNNER_TEMP" && zip -r "${GITHUB_WORKSPACE}/${ZIP_NAME}" "$package_name" -x "*.DS_Store")

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "$ZIP_NAME" \
            --title "Voice Live Comment ${GITHUB_REF_NAME}" \
            --notes "Chrome拡張機能の配布版zipです。zipを展開し、Chromeの「パッケージ化されていない拡張機能を読み込む」から展開後のフォルダを選択してください。"
