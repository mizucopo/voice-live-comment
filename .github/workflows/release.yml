name: Release extension

on:
  pull_request_target:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Validate release version
        env:
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail

          if [[ "$(git rev-parse HEAD)" != "$MERGE_COMMIT_SHA" ]]; then
            echo "Checked out commit does not match merge commit (${MERGE_COMMIT_SHA})" >&2
            exit 1
          fi

          package_version="$(node -p "require('./package.json').version")"
          manifest_version="$(node -p "require('./manifest.json').version")"

          if [[ ! "$package_version" =~ ^[0-9]+(\.[0-9]+){2,3}$ ]]; then
            echo "Version must be <major>.<minor>.<patch> or <major>.<minor>.<patch>.<build>: ${package_version}" >&2
            exit 1
          fi

          if [[ "$manifest_version" != "$package_version" ]]; then
            echo "manifest.json version (${manifest_version}) does not match package.json version (${package_version})" >&2
            exit 1
          fi

          release_tag="v${package_version}"
          tag_already_exists="false"

          if git ls-remote --exit-code --tags origin "refs/tags/${release_tag}" >/dev/null 2>&1; then
            git fetch --force --no-tags origin "refs/tags/${release_tag}:refs/tags/${release_tag}"
            existing_tag_commit="$(git rev-list -n 1 "${release_tag}")"

            if [[ "$existing_tag_commit" != "$MERGE_COMMIT_SHA" ]]; then
              echo "Release tag already exists for another commit: ${release_tag} (${existing_tag_commit})" >&2
              exit 1
            fi

            tag_already_exists="true"
          fi

          {
            echo "RELEASE_VERSION=${package_version}"
            echo "RELEASE_TAG=${release_tag}"
            echo "TAG_ALREADY_EXISTS=${tag_already_exists}"
            echo "ZIP_NAME=voice-live-comment-v${package_version}.zip"
          } >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build content script
        run: npm run build

      - name: Package extension
        run: |
          set -euo pipefail

          package_name="voice-live-comment-v${RELEASE_VERSION}"
          package_dir="${RUNNER_TEMP}/${package_name}"
          mkdir -p "$package_dir"

          cp manifest.json options.html LICENSE "$package_dir/"
          cp -R src dist icons "$package_dir/"

          test -f "$package_dir/manifest.json"
          test -f "$package_dir/options.html"
          test -f "$package_dir/LICENSE"
          test -f "$package_dir/dist/content.js"
          test -f "$package_dir/src/background.js"
          test -f "$package_dir/src/options.js"
          test -f "$package_dir/icons/icon128.png"

          (cd "$RUNNER_TEMP" && zip -r "${GITHUB_WORKSPACE}/${ZIP_NAME}" "$package_name" -x "*.DS_Store")

      - name: Create release tag
        run: |
          set -euo pipefail

          if [[ "$TAG_ALREADY_EXISTS" == "true" ]]; then
            echo "Release tag already exists on merge commit: ${RELEASE_TAG}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "Release ${RELEASE_TAG}"
          git push origin "$RELEASE_TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$ZIP_NAME" --clobber
          else
            gh release create "$RELEASE_TAG" "$ZIP_NAME" \
              --title "Voice Live Comment ${RELEASE_TAG}" \
              --notes "Chrome拡張機能の配布版zipです。zipを展開し、Chromeの「パッケージ化されていない拡張機能を読み込む」から展開後のフォルダを選択してください。"
          fi
