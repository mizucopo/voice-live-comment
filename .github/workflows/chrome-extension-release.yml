name: Chrome Extension Distribution Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Verify merged PR commit checkout
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_SHA="${{ github.sha }}"
          CURRENT_SHA="$(git rev-parse HEAD)"

          if [ "$CURRENT_SHA" != "$RELEASE_SHA" ]; then
            echo "::error::Expected checkout at release commit $RELEASE_SHA but found $CURRENT_SHA."
            exit 1
          fi

          PR_NUMBER="$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/commits/${RELEASE_SHA}/pulls" \
              --jq '.[] | select(.merged_at != null and .base.ref == "main") | .number' \
              | head -n 1
          )"

          if [ -z "$PR_NUMBER" ]; then
            echo "::error::Release commit $RELEASE_SHA is not associated with a merged pull request into main."
            exit 1
          fi

          echo "Release commit $RELEASE_SHA came from merged PR #$PR_NUMBER."

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: ".node-version"

      - name: Prepare release metadata
        id: release-metadata
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const packageRoot = ".";
          const manifestPath = path.posix.join(
            packageRoot.replaceAll("\\", "/"),
            "src/manifest.json",
          );
          const zipNameTemplate = "chrome-extension-{version}.zip";
          const releaseTitleTemplate = "Chrome Extension {version}";
          const releaseNotesTemplate = "Chrome Extension distribution package for {version}.";

          const outputPath = process.env.GITHUB_OUTPUT;

          function setOutput(name, value) {
            fs.appendFileSync(outputPath, `${name}=${value}\n`);
          }

          function fail(message) {
            fs.writeFileSync("release_metadata_error.txt", `${message}\n`);
            console.error(message);
            process.exit(1);
          }

          function normalizeRelativePath(value, label) {
            if (typeof value !== "string" || value.length === 0) {
              fail(`${label} must be a non-empty string.`);
            }

            const normalized = value.replaceAll("\\", "/");
            if (
              path.posix.isAbsolute(normalized) ||
              normalized.split("/").includes("..")
            ) {
              fail(`${label} must be relative to the repository root.`);
            }

            const withoutTrailingSlash = normalized.replace(/\/+$/u, "");
            return withoutTrailingSlash.length === 0 ? "." : withoutTrailingSlash;
          }

          function readJson(filePath) {
            try {
              return JSON.parse(fs.readFileSync(filePath, "utf8"));
            } catch (error) {
              fail(`Could not read ${filePath}: ${error.message}`);
            }
          }

          function relativePathFromPackageRoot(packageRootValue, filePath, label) {
            let relativePath = filePath;
            if (packageRootValue !== ".") {
              relativePath = path.posix.relative(packageRootValue, filePath);
            }
            if (
              relativePath.length === 0 ||
              relativePath === ".." ||
              relativePath.startsWith("../") ||
              path.posix.isAbsolute(relativePath)
            ) {
              fail(`${label} must be inside the Package root directory.`);
            }
            return relativePath;
          }

          function isChromeManifestVersion(value) {
            if (typeof value !== "string") {
              return false;
            }

            const parts = value.split(".");
            if (parts.length < 1 || parts.length > 4) {
              return false;
            }
            if (parts.every((part) => part === "0")) {
              return false;
            }

            return parts.every((part) => {
              if (!/^(0|[1-9][0-9]*)$/.test(part)) {
                return false;
              }
              return Number(part) <= 65535;
            });
          }

          function renderTemplate(value, version, label) {
            if (typeof value !== "string" || value.length === 0) {
              fail(`${label} must be a non-empty string.`);
            }
            return value.replaceAll("{version}", version);
          }

          function requireSingleLine(value, label) {
            if (/[\r\n]/.test(value) || value.trim().length === 0) {
              fail(`${label} must be a non-empty single-line value.`);
            }
            return value;
          }

          const normalizedPackageRoot = normalizeRelativePath(
            packageRoot,
            "Package root directory",
          );
          const normalizedManifestPath = normalizeRelativePath(
            manifestPath,
            "Chrome manifest path",
          );
          if (normalizedManifestPath === ".") {
            fail("Chrome manifest path must point to a manifest file.");
          }

          const packageJsonPath = path.posix.join(
            normalizedPackageRoot,
            "package.json",
          );
          const packageJson = readJson(packageJsonPath);
          const manifestFilePath = normalizedManifestPath;
          const manifest = readJson(manifestFilePath);
          const packageVersion = packageJson.version;
          const manifestVersion = manifest.version;
          const packageRelativeManifestPath = relativePathFromPackageRoot(
            normalizedPackageRoot,
            manifestFilePath,
            "Chrome manifest path",
          );
          const fallbackDistributionRoot = path.posix.dirname(
            packageRelativeManifestPath,
          );

          if (typeof packageVersion !== "string" || packageVersion.length === 0) {
            fail("package.json version must be a non-empty string.");
          }
          if (!isChromeManifestVersion(manifestVersion)) {
            fail(
              `Chrome manifest version "${manifestVersion}" must use 1 to 4 dot-separated integers between 0 and 65535.`,
            );
          }
          if (packageVersion !== manifestVersion) {
            fail(
              `package.json version "${packageVersion}" does not match ${manifestFilePath} version "${manifestVersion}".`,
            );
          }

          const zipName = requireSingleLine(
            renderTemplate(zipNameTemplate, packageVersion, "Distribution ZIP name"),
            "Distribution ZIP name",
          );
          if (zipName.includes("/") || zipName.includes("\\")) {
            fail("Distribution ZIP name must not contain path separators.");
          }
          if (zipName.includes("#")) {
            fail("Distribution ZIP name must not contain #.");
          }
          if (!zipName.endsWith(".zip")) {
            fail("Distribution ZIP name must end with .zip.");
          }

          const releaseTitle = requireSingleLine(
            renderTemplate(releaseTitleTemplate, packageVersion, "Release title"),
            "Release title",
          );
          const releaseNotes = renderTemplate(
            releaseNotesTemplate,
            packageVersion,
            "Release notes",
          );
          if (releaseNotes.trim().length === 0) {
            fail("Release notes must be non-empty.");
          }
          const zipPath = path.join(process.env.RUNNER_TEMP || process.cwd(), zipName);
          const releaseNotesPath = path.join(
            process.env.RUNNER_TEMP || process.cwd(),
            "release-notes.md",
          );
          fs.writeFileSync(releaseNotesPath, `${releaseNotes}\n`);

          setOutput("package_root", normalizedPackageRoot);
          setOutput("manifest_path", manifestFilePath);
          setOutput("fallback_distribution_root", fallbackDistributionRoot);
          setOutput("version", packageVersion);
          setOutput("manifest_version", manifestVersion);
          setOutput("tag", packageVersion);
          setOutput("zip_name", zipName);
          setOutput("zip_path", zipPath);
          setOutput("release_notes_path", releaseNotesPath);
          setOutput("release_title", releaseTitle);
          NODE

      - name: Install dependencies
        working-directory: ${{ steps.release-metadata.outputs.package_root }}
        run: npm ci

      - name: Run quality gate
        working-directory: ${{ steps.release-metadata.outputs.package_root }}
        run: npm run check

      - name: Build extension
        working-directory: ${{ steps.release-metadata.outputs.package_root }}
        run: npm run build

      - name: Resolve distribution root
        id: distribution-root
        working-directory: ${{ steps.release-metadata.outputs.package_root }}
        env:
          FALLBACK_DISTRIBUTION_ROOT: ${{ steps.release-metadata.outputs.fallback_distribution_root }}
        run: |
          if [ -f dist/manifest.json ]; then
            echo "path=dist" >> "$GITHUB_OUTPUT"
          elif [ -f "$FALLBACK_DISTRIBUTION_ROOT/manifest.json" ]; then
            echo "path=$FALLBACK_DISTRIBUTION_ROOT" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No manifest.json found in dist or fallback distribution root $FALLBACK_DISTRIBUTION_ROOT."
            exit 1
          fi

      - name: Validate distribution manifest
        working-directory: ${{ steps.release-metadata.outputs.package_root }}
        env:
          DISTRIBUTION_ROOT: ${{ steps.distribution-root.outputs.path }}
          EXPECTED_VERSION: ${{ steps.release-metadata.outputs.version }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          function fail(message) {
            console.error(message);
            process.exit(1);
          }

          function readJson(filePath) {
            try {
              return JSON.parse(fs.readFileSync(filePath, "utf8"));
            } catch (error) {
              fail(`Could not read ${filePath}: ${error.message}`);
            }
          }

          function isChromeManifestVersion(value) {
            if (typeof value !== "string") {
              return false;
            }

            const parts = value.split(".");
            if (parts.length < 1 || parts.length > 4) {
              return false;
            }
            if (parts.every((part) => part === "0")) {
              return false;
            }

            return parts.every((part) => {
              if (!/^(0|[1-9][0-9]*)$/.test(part)) {
                return false;
              }
              return Number(part) <= 65535;
            });
          }

          const distributionRoot = process.env.DISTRIBUTION_ROOT;
          const expectedVersion = process.env.EXPECTED_VERSION;
          const manifestPath = path.join(distributionRoot, "manifest.json");
          const manifest = readJson(manifestPath);
          const manifestVersion = manifest.version;

          if (!isChromeManifestVersion(manifestVersion)) {
            fail(
              `Chrome distribution manifest version "${manifestVersion}" must use 1 to 4 dot-separated integers between 0 and 65535.`,
            );
          }
          if (manifestVersion !== expectedVersion) {
            fail(
              `${manifestPath} version "${manifestVersion}" does not match package.json version "${expectedVersion}".`,
            );
          }
          NODE

      - name: Create distribution zip
        working-directory: ${{ steps.release-metadata.outputs.package_root }}
        env:
          DISTRIBUTION_ROOT: ${{ steps.distribution-root.outputs.path }}
          ZIP_PATH: ${{ steps.release-metadata.outputs.zip_path }}
        run: |
          rm -f "$ZIP_PATH"
          cd "$DISTRIBUTION_ROOT"

          if [ "$DISTRIBUTION_ROOT" = "." ]; then
            zip_args=(
              -x ".git/*"
              -x ".github/*"
              -x ".copier-answers.yml"
              -x ".gitignore"
              -x ".node-version"
              -x "AGENTS.md"
              -x "CLAUDE.md"
              -x "CONTEXT.md"
              -x "LICENSE"
              -x "README.md"
              -x "docs/*"
              -x "node_modules/*"
              -x "scripts/*"
              -x "src/*"
              -x "test/*"
              -x "tests/*"
              -x ".prettierignore"
              -x ".prettierrc.json"
              -x "eslint.config.mjs"
              -x "package-lock.json"
              -x "package.json"
              -x "rollup.config.mjs"
              -x "tsconfig.json"
              -x "tsconfig.build.json"
              -x "vite.config.ts"
              -x "vitest.config.js"
              -x "vitest.config.ts"
            )
            zip -r "$ZIP_PATH" . "${zip_args[@]}"
          else
            zip -r "$ZIP_PATH" .
          fi

      - name: Read git author
        id: author
        run: |
          echo "name=$(git log -1 --format=%an)" >> "$GITHUB_OUTPUT"
          echo "email=$(git log -1 --format=%ae)" >> "$GITHUB_OUTPUT"

      - name: Configure Git
        env:
          GIT_USER_NAME: ${{ steps.author.outputs.name }}
          GIT_USER_EMAIL: ${{ steps.author.outputs.email }}
        run: |
          git config user.name "$GIT_USER_NAME"
          git config user.email "$GIT_USER_EMAIL"

      - name: Create or reuse version tag
        env:
          TAG: ${{ steps.release-metadata.outputs.tag }}
        run: |
          git fetch --tags
          HEAD_SHA="$(git rev-parse HEAD)"

          if git show-ref --tags --verify --quiet "refs/tags/$TAG"; then
            TAG_SHA="$(git rev-list -n 1 "refs/tags/$TAG")"
            if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
              echo "::error::Tag $TAG already points to $TAG_SHA, not $HEAD_SHA."
              exit 1
            fi
            echo "Tag $TAG already points to this merge commit; reusing it."
          else
            git tag -a "$TAG" -m "Chrome Extension Release $TAG"
            git push origin "$TAG"
          fi

      - name: Create or reuse GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TITLE: ${{ steps.release-metadata.outputs.release_title }}
          TAG: ${{ steps.release-metadata.outputs.tag }}
          ZIP_PATH: ${{ steps.release-metadata.outputs.zip_path }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub Release $TAG already exists; reusing it."
          else
            gh release create "$TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file "${{ steps.release-metadata.outputs.release_notes_path }}"
          fi

          gh release upload "$TAG" "$ZIP_PATH" --clobber
